version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - MEMORY_DIR=/app/data/memory
      - CHROMA_DIR=/app/data/chroma
      - DB_PATH=/app/data/futuro.db
      - ALLOWED_ORIGINS=http://localhost:3000
      - DEBUG=true
    volumes:
      - ./backend/data:/app/data
      - ./backend/app:/app/app   # hot reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
